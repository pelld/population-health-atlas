name: Refresh official data

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/build_real_data.py"
      - "requirements.txt"
      - ".github/workflows/refresh-data.yml"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Build static datasets
        run: python scripts/build_real_data.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/atlas-data.js data/icb-boundaries.js
          git diff --cached --quiet || git commit -m "Refresh official QOF and deprivation data"
          git push
